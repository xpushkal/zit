name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: zit
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: zit
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: zit
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: zit
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: zit.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../zit-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../zit-${{ matrix.target }}.zip ${{ matrix.artifact }}
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zit-${{ matrix.target }}
          path: zit-${{ matrix.target }}.*

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -n 2 | tail -n 1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md

          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" >> changelog.md
          else
            git log --pretty=format:"- %s (%h)" >> changelog.md
          fi

          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}" >> changelog.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-formula:
    name: Update Homebrew Formula
    needs: create-release
    runs-on: ubuntu-latest
    # Only run on real version tags (not pre-releases)
    if: ${{ !contains(github.ref, '-rc') && !contains(github.ref, '-beta') && !contains(github.ref, '-alpha') }}
    steps:
      - name: Compute new version and SHA256
        id: formula
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"

          # Download the source tarball and compute its SHA256
          curl -sL "$URL" -o source.tar.gz
          SHA=$(sha256sum source.tar.gz | awk '{print $1}')

          echo "tag=$TAG"   >> $GITHUB_OUTPUT
          echo "url=$URL"   >> $GITHUB_OUTPUT
          echo "sha=$SHA"   >> $GITHUB_OUTPUT

      - name: Clone homebrew-zit tap repo
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/JUSTMEETPATEL/homebrew-zit.git tap
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Patch Formula/zit.rb in tap repo
        run: |
          TAG="${{ steps.formula.outputs.tag }}"
          URL="${{ steps.formula.outputs.url }}"
          SHA="${{ steps.formula.outputs.sha }}"

          sed -i "s|url \".*\"|url \"$URL\"|"     tap/Formula/zit.rb
          sed -i "s|sha256 \".*\"|sha256 \"$SHA\"|" tap/Formula/zit.rb

          echo "Updated Formula/zit.rb to $TAG"
          grep -E 'url|sha256' tap/Formula/zit.rb

      - name: Commit and push updated formula
        run: |
          cd tap
          git add Formula/zit.rb
          git commit -m "chore: bump Homebrew formula to ${{ steps.formula.outputs.tag }}" || echo "No changes to commit"
          git push origin main
